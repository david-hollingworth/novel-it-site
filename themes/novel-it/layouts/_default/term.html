{{ define "main" }}

  <h1 class="text-3xl font-bold mb-8">#{{ .Title }}</h1>

  <!-- Posts for this tag — newest first -->
  <div class="space-y-8">
    {{ range .Pages.ByDate.Reverse }}
    <article class="border-b border-gray-300 pb-8">
      <h2 class="text-2xl font-bold mb-1">
        <a href="{{ .Permalink }}" class="hover:opacity-70">{{ .Title }}</a>
      </h2>
      <div class="text-xs text-gray-500 mb-3">
        {{ .Date.Format $.Site.Params.dateFormat }}
        {{ with .Params.tags }}
          &nbsp;·&nbsp;
          {{ range . }}
          <a href="{{ ($.Site.GetPage (printf "/tags/%s" (. | urlize))).Permalink }}" class="hover:opacity-70">#{{ . }}</a>
          {{ end }}
        {{ end }}
      </div>
      <div class="prose max-w-none leading-relaxed">{{ .Summary | safeHTML }}</div>
      <a href="{{ .Permalink }}" class="text-sm mt-2 inline-block hover:opacity-70">Read more →</a>
    </article>
    {{ end }}
  </div>

{{ end }}
